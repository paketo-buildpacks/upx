api = "0.10"

[buildpack]
  description = "A Cloud Native Buildpack that provides the UPX binary compression tool"
  homepage = "https://github.com/paketo-buildpacks/upx"
  id = "paketo-buildpacks/upx"
  keywords = ["upx", "compression"]
  name = "Paketo Buildpack for UPX"
  sbom-formats = ["application/vnd.syft+json", "application/vnd.cyclonedx+json"]
  version = "{{.version}}"

  [[buildpack.licenses]]
    type = "Apache-2.0"
    uri = "https://github.com/paketo-buildpacks/upx/blob/main/LICENSE"

[metadata]
  include-files = ["LICENSE", "NOTICE", "README.md", "buildpack.toml", "linux/amd64/bin/build", "linux/amd64/bin/detect", "linux/amd64/bin/run", "linux/arm64/bin/build", "linux/arm64/bin/detect", "linux/arm64/bin/run"]
  pre-package = "scripts/build.sh --target linux/amd64 --target linux/arm64"

  [[metadata.dependencies]]
    arch = "amd64"
    checksum = "sha256:1ff660454227861e00772f743f66b900072116b9dc24f6ee28b97cce88a7828a"
    cpe = "cpe:2.3:a:upx_project:upx:5.1.1:*:*:*:*:*:*:*"
    id = "upx"
    os = "linux"
    purl = "pkg:generic/upx@5.1.1?arch=amd64"
    source = "https://github.com/upx/upx/archive/refs/tags/v5.1.1.tar.gz"
    source-checksum = "sha256:70fea534e537750dd33e96c26a29f581157ed35d1370b7fd5e3eb74e91b02df4"
    stacks = ["*"]
    uri = "https://github.com/upx/upx/releases/download/v5.1.1/upx-5.1.1-amd64_linux.tar.xz"
    version = "5.1.1"

    [[metadata.dependencies.licenses]]
      type = "GPL-2.0-or-later"
      uri = "https://github.com/upx/upx/blob/devel/LICENSE"

  [[metadata.dependencies]]
    arch = "arm64"
    checksum = "sha256:a307c2c821eeab47607ba5c232408b22ab884cca13884682508b98f7308b8443"
    cpe = "cpe:2.3:a:upx_project:upx:5.1.1:*:*:*:*:*:*:*"
    id = "upx"
    os = "linux"
    purl = "pkg:generic/upx@5.1.1?arch=arm64"
    source = "https://github.com/upx/upx/archive/refs/tags/v5.1.1.tar.gz"
    source-checksum = "sha256:70fea534e537750dd33e96c26a29f581157ed35d1370b7fd5e3eb74e91b02df4"
    stacks = ["*"]
    uri = "https://github.com/upx/upx/releases/download/v5.1.1/upx-5.1.1-arm64_linux.tar.xz"
    version = "5.1.1"

    [[metadata.dependencies.licenses]]
      type = "GPL-2.0-or-later"
      uri = "https://github.com/upx/upx/blob/devel/LICENSE"

  [[metadata.dependencies]]
    id = "upx"
    name = "UPX (The Ultimate Packer for eXecutables)"
    purl = "pkg:generic/upx@5.2.0?arch=amd64"
    sha256 = "3db5d3294707439db97866feab8d75d800f028f48481a40547411824da4288a1"
    source = "https://github.com/upx/upx/archive/refs/tags/v5.2.0.tar.gz"
    stacks = ["*"]
    uri = "https://github.com/upx/upx/releases/download/v5.2.0/upx-5.2.0-amd64_linux.tar.xz"
    version = "5.2.0"

    [[metadata.dependencies.licenses]]
      type = "GPL-2.0-or-later"
      uri = "https://github.com/upx/upx/blob/devel/LICENSE"

  [[metadata.dependency-constraints]]
    constraint = "*"
    id = "upx"
    patches = 2

[[stacks]]
  id = "*"

[[targets]]
  arch = "amd64"
  os = "linux"

[[targets]]
  arch = "arm64"
  os = "linux"
